<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Management</title>
  <link rel="stylesheet" href="CRMInterface.css">
  <style>
    .customer-item 
    {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 6px;
      border-bottom: 1px solid #ccc;
    }
    .delete-btn {
      color: red;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    // Navigation bar
    <h1>Customer Management</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="tasks.html">Tasks</a></li>
        <li><a href="communications.html">Communications</a></li>
      </ul>
    </nav>

    // Form to add a new customer
    <h2>Add Customer</h2>
    <input id="custName" placeholder="Name">
    <input id="custEmail" placeholder="Email">
    <input id="custPhone" placeholder="Phone">
    <button onclick="addCustomer()">Add Customer</button>

    // List of customers
    <h2>Customer List</h2>
    <div id="customerList"></div>
  </div>

  //JavaScript to handle loading customers and adding/deleting them
  <script>
    async function loadCustomers() 
    {
      const res = await fetch('/api/customers');
      const data = await res.json();
      const list = document.getElementById('customerList');
      list.innerHTML = '';

      data.forEach(c => {
        const item = document.createElement('div');
        item.className = 'customer-item';

        const info = document.createElement('span');
        info.textContent = `${c.name} (${c.email}, ${c.phone})`;

        const delBtn = document.createElement('span');
        delBtn.className = 'delete-btn';
        delBtn.textContent = 'X';
        delBtn.onclick = () => deleteCustomer(c.id);

        item.appendChild(info);
        item.appendChild(delBtn);
        list.appendChild(item);
      });
    }

    async function addCustomer() 
    {
      const name = document.getElementById('custName').value;
      const email = document.getElementById('custEmail').value;
      const phone = document.getElementById('custPhone').value;

      if (!name || !email || !phone) {
        alert('Please fill out all fields.');
        return;
      }

      await fetch('/api/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone })
      });

      loadCustomers();
    }

    async function deleteCustomer(id) 
    {
      await fetch(`/api/customers/${id}`, { method: 'DELETE' });
      loadCustomers();
    }

    // Load customers when the page loads
    window.onload = loadCustomers;
  </script>
</body>
</html>
