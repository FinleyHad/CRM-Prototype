<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Management</title>
  <link rel="stylesheet" href="CRMInterface.css">
  <style>
    ul#taskList 
    {
      padding: 0;
      list-style: none;
    }
    #taskList li 
    {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      background: #f9f9f9;
      margin-bottom: 5px;
    }
    .sort-row 
    {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .sort-row p 
    {
      margin: 0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Management</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="customers.html">Customers</a></li>
        <li><a href="communications.html">Communications</a></li>
      </ul>
    </nav>

    <!-- Form to add a new task -->
    <section>
      <h2>Add Task</h2>
      <div class="form-group">
        <div class="sort-row">
          <p>Customer (A–Z)</p>
          <select id="sortDirection" onchange="loadCustomers('taskCustomerId')">
            <option value="asc">A–Z</option>
            <option value="desc">Z–A</option>
          </select>
        </div>
        <select id="taskCustomerId"></select>
        <input id="taskDesc" placeholder="Task Description">
        <input id="taskDue" type="date" placeholder="Due Date">
        <button onclick="addTask()">Add Task</button>
      </div>
    </section>

    <!-- List of tasks -->
    <section>
      <h2>Task List</h2>
      <ul id="taskList"></ul>
    </section>
  </div>

  <script>
    // Load customers into dropdown sorted A–Z or Z–A
    async function loadCustomers(selectId) 
    {
      const res = await fetch('/api/customers');
      let data = await res.json();

      const direction = document.getElementById("sortDirection")?.value || "asc";
      data.sort((a, b) => a.name.localeCompare(b.name));
      if (direction === "desc") data.reverse();

      const select = document.getElementById(selectId);
      select.innerHTML = '';

      data.forEach(customer => {
        const option = document.createElement('option');
        option.value = customer.id;
        option.textContent = customer.name;
        select.appendChild(option);
      });
    }

    // Add new task
    async function addTask() 
    {
      const description = document.getElementById('taskDesc').value;
      const dueDate = document.getElementById('taskDue').value;
      const customerId = parseInt(document.getElementById('taskCustomerId').value);

      if (!description || !dueDate || isNaN(customerId)) {
        alert('Please fill out all fields.');
        return;
      }

      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description, dueDate, customerId })
      });

      loadTasks();
    }

    // Load task list
    async function loadTasks() 
    {
      const res = await fetch('/api/tasks');
      const data = await res.json();
      const list = document.getElementById('taskList');
      list.innerHTML = '';

      if (data.length === 0) {
        list.innerHTML = '<li>No tasks found.</li>';
        return;
      }

      data.forEach(task => {
        const item = document.createElement('li');
        item.textContent = `${task.description} — Due: ${new Date(task.dueDate).toLocaleDateString()}`;
        list.appendChild(item);
      });
    }

    // Initialize page
    window.onload = () => {
      loadCustomers('taskCustomerId');
      loadTasks();
    };
  </script>
</body>
</html>
