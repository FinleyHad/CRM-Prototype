<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="stylesheet" href="CRMInterface.css">
</head>
<body>
  <div class="container">
    <h1>Chat with Customer</h1>
    <a href="communications.html">← Back to Communications</a>

    <div id="chatThread" class="chat-thread"></div>

    <div class="form-group">
      <input id="chatType" placeholder="Type (email, call)">
      <input id="chatContent" placeholder="Your message">
      <input id="chatDate" placeholder="Date (YYYY-MM-DD)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const customerId = urlParams.get('customerId');

    async function loadChat() {
      const res = await fetch(`/api/communications/customer/${customerId}`);
      const data = await res.json();
      const chat = document.getElementById('chatThread');
      chat.innerHTML = '';

      data.forEach(c => {
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';

        const text = document.createElement('div');
        text.textContent = c.content;
        bubble.appendChild(text);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${c.type} • ${c.date}`;
        bubble.appendChild(meta);

        chat.appendChild(bubble);
      });
    }

    async function sendMessage() {
      const type = document.getElementById('chatType').value;
      const content = document.getElementById('chatContent').value;
      const date = document.getElementById('chatDate').value;

      await fetch('/api/communications', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, content, date, customerId: parseInt(customerId) })
      });

      loadChat();
    }

    window.onload = loadChat;
  </script>
</body>
</html>
