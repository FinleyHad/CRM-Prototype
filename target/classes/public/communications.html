<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Communication Log</title>
  <link rel="stylesheet" href="CRMInterface.css">

  <!-- Styling for communication log layout and sorting -->
  <style>
    .chat-bubble 
    {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-bottom: 10px;
      background: #f9f9f9;
    }
    .meta 
    {
      font-size: 0.9em;
      color: gray;
    }
    .sort-row 
    {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .sort-row p 
    {
      margin: 0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Navigation bar -->
    <h1>Communication Log</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="customers.html">Customers</a></li>
        <li><a href="tasks.html">Tasks</a></li>
      </ul>
    </nav>

    <!-- Form to add a new communication -->
    <h2>Add Communication</h2>
    <div class="sort-row">
      <p>Customer (A–Z)</p>
      <select id="sortDirection" onchange="loadCustomers('commCustomerId')">
        <option value="asc">A–Z</option>
        <option value="desc">Z–A</option>
      </select>
    </div>
    <select id="commCustomerId"></select>
    <input id="commType" placeholder="Type (email, call)">
    <input id="commContent" placeholder="Content">
    <input id="commDate" type="date" placeholder="Date">
    <button onclick="addCommunication()">Add Communication</button>

    <!-- List of communications -->
    <h2>Communication History</h2>
    <div id="commList"></div>
  </div>

  <!-- JavaScript to handle loading customers and communications -->
  <script>
    // Load customers sorted A–Z or Z–A
    async function loadCustomers(selectId) 
    {
      const res = await fetch('/api/customers');
      const data = await res.json();

      const sortDirection = document.getElementById('sortDirection')?.value || 'asc';
      data.sort((a, b) => a.name.localeCompare(b.name));
      if (sortDirection === 'desc') data.reverse();

      const select = document.getElementById(selectId);
      select.innerHTML = '';

      data.forEach(customer => {
        const option = document.createElement('option');
        option.value = customer.id;
        option.textContent = customer.name;
        select.appendChild(option);
      });
    }

    // Add a new communication
    async function addCommunication() 
    {
      const type = document.getElementById('commType').value.trim();
      const content = document.getElementById('commContent').value.trim();
      const date = document.getElementById('commDate').value;
      const customerId = parseInt(document.getElementById('commCustomerId').value);

      if (!type || !content || !date || isNaN(customerId)) {
        alert('Please fill out all fields.');
        return;
      }

      await fetch('/api/communications', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, content, date, customerId })
      });

      loadCommunications();
    }

    // Load and render communication list
    async function loadCommunications() 
    {
      const res = await fetch('/api/communications');
      const data = await res.json();

      const list = document.getElementById('commList');
      list.innerHTML = '';

      if (!data || data.length === 0) 
      {
        list.innerHTML = '<p>No communications found.</p>';
        return;
      }

      data.forEach(c => {
        const item = document.createElement('div');
        item.className = 'chat-bubble';
        item.innerHTML = `
          <strong>${c.type}</strong><br>
          ${c.content}<br>
          <div class="meta">${new Date(c.date).toLocaleDateString()}</div>
        `;
        list.appendChild(item);
      });
    }

    // Initial load
    window.onload = () => 
    {
      loadCustomers('commCustomerId');
      loadCommunications();
    };
  </script>
</body>
</html>
